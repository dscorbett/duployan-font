[tool.coverage.run]
branch = true
parallel = true
relative_files = true

[tool.coverage.report]
exclude_also = [
    "#[\t ]*type:[\t ]*ignore[\t\\v\f ]*\\[([^]#]*,)?\\s*unreachable\\s*(,[^]#]*)?\\]\\s*(#.*)?$",
    "^[\t\f ]*(case _:(\r\n?|\n)[\t\f ]*((#.*)?(\r\n?|\n)[\t\f ]*)*)?assert_never\\(\\b",
    "^[\t\f ]*(case _:(\r\n?|\n)[\t\f ]*((#.*)?(\r\n?|\n)[\t\f ]*)*)?raise ValueError\\b",
    "^[\t\f ]*@overload$",
    "^[\t\f ]*assert False(,|$)",
    "^[\t\f ]*def __repr__\\(",
    "^[\t\f ]*if TYPE_CHECKING:",
    "^[\t\f ]*raise NotImplementedError\\b",
]
fail_under = 96

[tool.mypy]
mypy_path = "$MYPY_CONFIG_FILE_DIR/typings"
enable_error_code = [
    "deprecated",
    "explicit-override",
    "ignore-without-code",
    "mutable-override",
    "narrowed-type-not-subtype",
    "redundant-expr",
    "redundant-self",
    "truthy-bool",
    "truthy-iterable",
    "unimported-reveal",
    "unused-awaitable",
]
allow_redefinition = true
disallow_any_decorated = true
disallow_any_explicit = true
disallow_any_expr = true
disallow_any_generics = true
disallow_any_unimported = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
exclude_gitignore = true
extra_checks = true
no_implicit_reexport = true
strict_equality = true
strict_equality_for_none = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
warn_unused_configs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
    "cffsubr",
    "fontTools.misc.configTools",
    "fontTools.misc.transform",
    "fontTools.otlLib.builder",
]
follow_untyped_imports = true

[[tool.mypy.overrides]]
module = [
    "otf2ttf",
]
ignore_errors = true

[tool.ruff]
src = [".", "sources"]
target-version = "py312"

[tool.ruff.lint]
exclude = [
    "sources/otf2ttf.py",
]
future-annotations = true
ignore = [
    # Not appropriate for this project
    "ambiguous-unicode-character-comment",
    "ambiguous-unicode-character-docstring",
    "assert",
    "assert-false",
    "boolean-default-value-positional-argument",
    "collapsible-else-if",
    "docstring-extraneous-exception",
    "f-string-in-exception",
    "if-else-block-instead-of-if-exp",
    "line-contains-todo",
    "missing-todo-author",
    "missing-todo-link",
    "non-empty-init-module",
    "parenthesize-chained-operators",
    "pytest-assert-always-false",
    "raw-string-in-exception",
    "repeated-global",
    "start-process-with-partial-path",
    "subclass-builtin",
    "subprocess-without-shell-equals-true",
    "superfluous-else-return",
    "suppressible-exception",
    "suspicious-subprocess-import",
    "unnecessary-multiline-docstring",
    "yoda-conditions",
    # Too many false positives
    "magic-value-comparison",  # https://github.com/astral-sh/ruff/issues/10009
    "missing-blank-line-after-summary",
    "private-member-access",
    "raise-vanilla-args",  # https://github.com/astral-sh/ruff/issues/14398
    "redefined-loop-name",  # https://github.com/astral-sh/ruff/issues/17951
    # Too many true positives
    "boolean-type-hint-positional-argument",
    "complex-structure",
    "too-many-arguments",
    "too-many-boolean-expressions",
    "too-many-branches",
    "too-many-locals",
    "too-many-nested-blocks",
    "too-many-positional-arguments",
    "too-many-public-methods",
    "too-many-return-statements",
    "too-many-statements",
    "undocumented-public-method",
    "undocumented-public-module",
]
preview = true
select = ["ALL"]

[tool.ruff.lint.flake8-builtins]
builtins-ignorelist = [
    "exit",
    "input",
]

[tool.ruff.lint.flake8-quotes]
inline-quotes = "single"
multiline-quotes = "single"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"typing.cast".msg = "Use a type annotation or `# type: ignore` instead"

[tool.ruff.lint.flake8-type-checking]
strict = true

[tool.ruff.lint.isort]
case-sensitive = true
force-single-line = true
force-sort-within-sections = true
known-third-party = ["fontforge"]
lines-after-imports = 2
no-lines-before = ["first-party"]
order-by-type = false
section-order = ["future", "standard-library", "third-party", "local-folder", "first-party"]

[tool.ruff.lint.pep8-naming]
extend-ignore-names = [
    # `fontforge.glyph` methods
    "addAnchorPoint",
    "boundingBox",
    "glyphPen",
    "removeOverlap",
    # `fontforge.glyphPen` methods
    "closePath",
    "curveTo",
    "endPath",
    "lineTo",
    "moveTo",
]

[tool.ruff.lint.per-file-ignores]
"sources/charsets/data.py" = [
    # Shape definitions are more maintainable one per line.
    "line-too-long",
]
"sources/phases/**" = [
    # Phases must all have the same signature.
    "unused-function-argument",
    # Too many true positives
    "undocumented-public-function",
]
"sources/shapes.py" = [
    # Shape classes are designed for inheritance. Even if a certain
    # method doesn’t use a certain argument, an override of it might.
    "no-self-use",
    "unused-method-argument",
]
"tests/run-tests.py" = [
    # Test results must be output.
    "print",
]
"**.pyi" = [
    # Third-party names cannot be changed.
    "builtin-argument-shadowing",
    "builtin-attribute-shadowing",
    "builtin-import-shadowing",
    "builtin-variable-shadowing",
    "dunder-function-name",
    "error-suffix-on-exception-name",
    "invalid-argument-name",
    "invalid-class-name",
    "invalid-first-argument-name-for-class-method",
    "invalid-first-argument-name-for-method",
    "invalid-function-name",
    "invalid-module-name",
    "mixed-case-variable-in-class-scope",
    "mixed-case-variable-in-global-scope",
    "stdlib-module-shadowing",
]

[tool.ruff.lint.pycodestyle]
max-line-length = 169

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.uv]
exclude-newer = "P7D"

[tool.uv.pip]
universal = true
upgrade = true
