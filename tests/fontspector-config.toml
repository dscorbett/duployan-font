exclude_checks = [
    "base_has_width",
    "contour_count",
    "googlefonts/gasp",
    "googlefonts/glyph_coverage",
    "googlefonts/metadata/unreachable_subsetting",
    "googlefonts/render_own_name",
    "googlefonts/repo/dirname_matches_nameid_1",
    "googlefonts/vertical_metrics",
    "ligature_carets",
    "math_signs_width",
    "gpos_kerning_info",
    "rupee",
#ifndef NOTO
    "googlefonts/name/line_breaks",
    "googlefonts/vendor_id",
#endif
]

[[overrides]]
code = "legacy-long-names"
status = "PASS"
reason = "Long glyph names are fine in practice"

[[overrides]]
code = "no-glyphset-supported"
status = "SKIP"
reason = "If no glyphset was found, there is nothing to check"
